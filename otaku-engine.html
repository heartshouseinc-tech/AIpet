<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>キャラ研究AI</title>
<style>
:root{--bg:#0f0018;--bg2:#180028;--bg3:#22003a;--card:#1a0030;--bor:rgba(255,120,220,.12);--bor2:rgba(255,120,220,.28);--pink:#f472b6;--pur:#a855f7;--pur2:#7c3aed;--pur-xl:rgba(168,85,247,.12);--gold:#f0b830;--grn:#10b981;--red:#ef4444;--txt:#fff0f8;--txt2:#c090d0;--txt3:#806090;--r:12px;--r2:8px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--txt);font-family:'Hiragino Sans','Noto Sans JP',sans-serif;min-height:100vh;}
.hdr{background:linear-gradient(135deg,#1a0030,#0a0020);border-bottom:1.5px solid var(--bor);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.hdr-title{font-size:16px;font-weight:900;background:linear-gradient(90deg,var(--pink),var(--pur));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.nav-links{display:flex;gap:5px;}
.nav-btn{padding:5px 10px;border-radius:20px;border:1.5px solid var(--bor2);background:transparent;color:var(--txt2);font-size:10px;cursor:pointer;text-decoration:none;}
.main{padding:14px;max-width:600px;margin:0 auto;}
.card{background:var(--card);border:1.5px solid var(--bor);border-radius:var(--r);padding:14px;margin-bottom:12px;}
.card-lbl{font-size:10px;font-weight:700;color:var(--txt3);letter-spacing:.5px;margin-bottom:8px;}
.inp{width:100%;padding:10px 12px;background:var(--bg3);border:1.5px solid var(--bor);border-radius:var(--r2);color:var(--txt);font-size:13px;font-family:inherit;outline:none;}
.inp:focus{border-color:var(--pink);}
.btn{padding:11px 16px;border-radius:var(--r2);border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-pink{background:linear-gradient(135deg,var(--pur2),var(--pink));color:#fff;}
.btn-pur{background:linear-gradient(135deg,var(--pur2),var(--pur));color:#fff;}
.btn-ghost{background:var(--bg3);border:1.5px solid var(--bor2);color:var(--txt2);}
.btn-full{width:100%;}
.btn-row{display:flex;gap:8px;}
.preset-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.preset-btn{padding:6px 12px;border-radius:20px;border:1.5px solid var(--bor2);background:var(--bg3);color:var(--txt2);font-size:11px;cursor:pointer;}
.preset-btn:active{background:var(--pur-xl);}
.result-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bor);}
.result-row:last-child{border-bottom:none;}
.rl{font-size:10px;color:var(--txt3);width:80px;flex-shrink:0;}
.rv{font-size:11px;color:var(--txt);flex:1;line-height:1.7;}
.tag-row{display:flex;flex-wrap:wrap;gap:4px;}
.tag{padding:2px 8px;border-radius:20px;font-size:9px;background:var(--pur-xl);color:var(--pur);}
.loading-wrap{text-align:center;padding:24px;}
.loading-ico{font-size:36px;animation:spin 1.5s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{font-size:11px;color:var(--txt3);margin-top:8px;}
.lib-item{background:var(--bg3);border:1.5px solid var(--bor);border-radius:var(--r2);padding:10px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;}
.lib-name{font-size:12px;font-weight:700;color:var(--txt);}
.lib-actions{display:flex;gap:4px;}
#toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1.5px solid var(--bor2);color:var(--txt);padding:8px 18px;border-radius:20px;font-size:11px;font-weight:700;z-index:9999;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;}
#toast.show{opacity:1;}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <div class="hdr-title">キャラ研究AI</div>
    <div style="font-size:9px;color:var(--txt3);">キャラクターを徹底解析してなりきりエンジンに渡す</div>
  </div>
  <div class="nav-links">
    <a class="nav-btn" href="petchi-hub.html">Hub</a>
    <a class="nav-btn" href="narikiri-bot.html">Narikiri</a>
  </div>
</div>
<div class="main">
  <div class="card">
    <div class="card-lbl">キャラクター名を入力</div>
    <input class="inp" id="char-inp" placeholder="例：ドラえもん、織田信長、大谷翔平" style="margin-bottom:10px;">
    <div class="card-lbl">プリセット</div>
    <div class="preset-grid" id="preset-grid"></div>
    <button class="btn btn-pink btn-full" onclick="analyzeChar()" id="analyze-btn">キャラクターを徹底解析する</button>
  </div>

  <div id="loading-area" style="display:none;">
    <div class="loading-wrap"><div class="loading-ico">🔍</div><div class="loading-txt" id="loading-txt">解析中...</div></div>
  </div>

  <div id="result-area" style="display:none;">
    <div class="card" id="result-card">
      <div class="card-lbl" id="result-char-name">解析結果</div>
      <div id="result-rows"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-pink" onclick="sendToNarikiri()" style="flex:1;">モノマネAIに送る</button>
      <button class="btn btn-ghost" onclick="saveToLib()" style="flex:1;">ライブラリ保存</button>
    </div>
  </div>

  <div class="card" style="margin-top:12px;">
    <div class="card-lbl">保存済みキャラライブラリ</div>
    <div id="lib-list"><div style="font-size:11px;color:var(--txt3);">まだ保存がありません</div></div>
  </div>
</div>
<div id="toast"></div>
<script>
var EP='https://asia-northeast1-kensetsu-nippo-842a2.cloudfunctions.net/askAI';
var KEY='HeartsHouse2026Key';
var currentCharData=null;

var PRESETS=['ドラえもん','孫悟空','ルフィ','鬼滅・炭治郎','明石家さんま','織田信長','坂本龍馬','大谷翔平','シャーロックホームズ','ドナルドダック'];

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
var _tt;
function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(function(){t.classList.remove('show');},3000);}

async function callAI(prompt,schema,useSearch){
  var body={model:'gemini-2.5-flash',mode:'normal',prompt:prompt,useSearch:!!useSearch,useCache:true};
  if(schema) body.responseSchema=schema;
  var r=await fetch(EP,{method:'POST',headers:{'Content-Type':'application/json','x-access-key':KEY},body:JSON.stringify(body)});
  var d=await r.json().catch(function(){return{};});
  if(!r.ok) throw new Error('HTTP '+r.status);
  return (d&&d.data&&d.data.text)?d.data.text:((d&&d.candidates&&d.candidates[0]&&d.candidates[0].content&&d.candidates[0].content.parts&&d.candidates[0].content.parts[0])?d.candidates[0].content.parts[0].text:((d&&d.text)?d.text:''));
}

function renderPresets(){
  document.getElementById('preset-grid').innerHTML=PRESETS.map(function(p){
    return '<button class="preset-btn" onclick="setPreset(\''+esc(p)+'\')">'+esc(p)+'</button>';
  }).join('');
}
function setPreset(name){document.getElementById('char-inp').value=name;}

async function analyzeChar(){
  var name=document.getElementById('char-inp').value.trim();
  if(!name){showToast('キャラクター名を入力してください');return;}
  var btn=document.getElementById('analyze-btn');btn.disabled=true;
  document.getElementById('loading-area').style.display='block';
  document.getElementById('result-area').style.display='none';
  document.getElementById('loading-txt').textContent=name+'を解析中...';

  var schema={
    type:'object',
    properties:{
      name:{type:'string'},
      category:{type:'string'},
      speech_style:{type:'string'},
      catchphrases:{type:'array',items:{type:'string'}},
      personality:{type:'string'},
      thinking_pattern:{type:'string'},
      background:{type:'string'},
      reaction_happy:{type:'string'},
      reaction_angry:{type:'string'},
      reaction_sad:{type:'string'},
      reaction_surprised:{type:'string'},
      famous_lines:{type:'array',items:{type:'string'}},
      values:{type:'string'},
      keywords:{type:'array',items:{type:'string'}}
    },
    required:['name','speech_style','catchphrases','personality','thinking_pattern','background','famous_lines']
  };

  var prompt='「'+name+'」というキャラクターについて徹底的に調査してください。アニメ・漫画・芸能人・歴史上の人物・ゲームキャラ何でも対応。口調・口癖・性格・思考パターン・名言・価値観を詳しく分析してJSON形式で返してください。なりきりAIが完璧に再現できるレベルの情報が必要です。';

  try{
    var raw=await callAI(prompt,schema,true);
    var data=JSON.parse(raw.replace(/```json|```/g,'').trim());
    currentCharData=data;
    showResult(data);
    localStorage.setItem('narikiri_char_data',JSON.stringify(data));
    showToast(name+'の解析完了');
  }catch(e){showToast('エラー:'+e.message);}

  document.getElementById('loading-area').style.display='none';
  btn.disabled=false;
}

function showResult(d){
  document.getElementById('result-area').style.display='block';
  document.getElementById('result-char-name').textContent=d.name||'解析結果';
  var rows=[
    ['カテゴリ',d.category||'-'],
    ['口調・話し方',d.speech_style||'-'],
    ['性格',d.personality||'-'],
    ['思考パターン',d.thinking_pattern||'-'],
    ['背景・設定',d.background||'-'],
    ['嬉しい時',d.reaction_happy||'-'],
    ['怒った時',d.reaction_angry||'-'],
    ['悲しい時',d.reaction_sad||'-'],
  ];
  var html=rows.map(function(r){return '<div class="result-row"><div class="rl">'+esc(r[0])+'</div><div class="rv">'+esc(r[1])+'</div></div>';}).join('');
  if(d.catchphrases&&d.catchphrases.length){
    html+='<div class="result-row"><div class="rl">口癖</div><div class="rv"><div class="tag-row">'+d.catchphrases.map(function(p){return '<span class="tag">'+esc(p)+'</span>';}).join('')+'</div></div></div>';
  }
  if(d.famous_lines&&d.famous_lines.length){
    html+='<div class="result-row"><div class="rl">名言</div><div class="rv">'+d.famous_lines.slice(0,3).map(function(l){return '"'+esc(l)+'"';}).join('<br>')+'</div></div>';
  }
  document.getElementById('result-rows').innerHTML=html;
}

function sendToNarikiri(){
  if(!currentCharData){showToast('先に解析してください');return;}
  localStorage.setItem('narikiri_char_data',JSON.stringify(currentCharData));
  if(window.parent!==window){
    window.parent.postMessage({type:'CHAR_DATA',data:currentCharData},'*');
  } else {
    window.location.href='narikiri-bot.html';
  }
  showToast(currentCharData.name+'をモノマネAIに送りました');
}

function saveToLib(){
  if(!currentCharData){showToast('先に解析してください');return;}
  var libs=[];
  try{libs=JSON.parse(localStorage.getItem('char_library')||'[]');}catch(e){}
  var exists=libs.findIndex(function(l){return l.name===currentCharData.name;});
  if(exists>=0) libs[exists]=currentCharData; else libs.push(currentCharData);
  localStorage.setItem('char_library',JSON.stringify(libs));
  renderLib();showToast(currentCharData.name+'を保存しました');
}

function renderLib(){
  var libs=[];
  try{libs=JSON.parse(localStorage.getItem('char_library')||'[]');}catch(e){}
  if(!libs.length){document.getElementById('lib-list').innerHTML='<div style="font-size:11px;color:var(--txt3);">まだ保存がありません</div>';return;}
  document.getElementById('lib-list').innerHTML=libs.map(function(c){
    return '<div class="lib-item"><div class="lib-name">'+esc(c.name||'')+'</div>'
      +'<div class="lib-actions">'
      +'<button class="btn btn-ghost" onclick="loadChar(\''+esc(c.name)+'\')" style="font-size:10px;padding:4px 10px;">読込</button>'
      +'<button class="btn btn-pink" onclick="sendCharByName(\''+esc(c.name)+'\')" style="font-size:10px;padding:4px 10px;">送る</button>'
      +'<button class="btn btn-ghost" onclick="deleteChar(\''+esc(c.name)+'\')" style="font-size:10px;padding:4px 10px;color:var(--red);">削除</button>'
      +'</div></div>';
  }).join('');
}

function loadChar(name){
  var libs=[];try{libs=JSON.parse(localStorage.getItem('char_library')||'[]');}catch(e){}
  var c=libs.find(function(l){return l.name===name;});
  if(c){currentCharData=c;showResult(c);localStorage.setItem('narikiri_char_data',JSON.stringify(c));showToast(name+'を読み込みました');}
}
function sendCharByName(name){
  loadChar(name);
  setTimeout(function(){sendToNarikiri();},100);
}
function deleteChar(name){
  var libs=[];try{libs=JSON.parse(localStorage.getItem('char_library')||'[]');}catch(e){}
  libs=libs.filter(function(l){return l.name!==name;});
  localStorage.setItem('char_library',JSON.stringify(libs));
  renderLib();showToast('削除しました');
}

// postMessage受信（hubからキャラ指定）
window.addEventListener('message',function(e){
  if(e.data&&e.data.type==='ANALYZE_CHAR'&&e.data.charName){
    document.getElementById('char-inp').value=e.data.charName;
    analyzeChar();
  }
});

renderPresets();
renderLib();
// localStorage確認
var pending=localStorage.getItem('narikiri_char_data');
if(pending){try{var d=JSON.parse(pending);if(d&&d.name){currentCharData=d;showResult(d);}}catch(e){}}
</script>
</body>
</html>
