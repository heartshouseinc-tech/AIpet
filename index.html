<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AI ペットっち</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCVk2miG5TK1ffTofXLh0hHgeSbOvmIgZ8",
  authDomain: "kensetsu-nippo-842a2.firebaseapp.com",
  projectId: "kensetsu-nippo-842a2",
  storageBucket: "kensetsu-nippo-842a2.firebasestorage.app",
  messagingSenderId: "702880974315",
  appId: "1:702880974315:web:985321dc9180046629c5ae"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const FUNCTIONS_URL = 'https://us-central1-kensetsu-nippo-842a2.cloudfunctions.net/askClaude';

window._fb = { auth, db, FUNCTIONS_URL, serverTimestamp,
  signIn: (e,p) => signInWithEmailAndPassword(auth,e,p),
  signUp: (e,p) => createUserWithEmailAndPassword(auth,e,p),
  signOut: () => signOut(auth),
  getDoc: (r) => getDoc(doc(db,'petchi_users',r)),
  setDoc: (r,d) => setDoc(doc(db,'petchi_users',r), d, {merge:true}),
};

onAuthStateChanged(auth, user => {
  window._fbUser = user;
  window.dispatchEvent(new CustomEvent('fb-auth-change', {detail: user}));
});
window.dispatchEvent(new Event('fb-ready'));
</script>

<style>
:root {
  --cream:#fdf6ec; --warm:#f5e6d0; --brown:#8b5e3c;
  --brown-light:#c49a6c; --brown-dark:#5c3d2e;
  --green:#7cb87a; --pink:#f4a7b9; --blue:#7bb8d4;
  --gold:#e8b84b; --purple:#a78bfa; --red:#e84a5f;
  --shadow:rgba(92,61,46,0.12);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Zen Maru Gothic',sans-serif;background:var(--cream);min-height:100vh;overflow-x:hidden;}
.screen{display:none;min-height:100vh;}
.screen.active{display:flex;flex-direction:column;}

/* LOADING */
#screen-loading{background:linear-gradient(135deg,#fdf0e0,#fff5eb);align-items:center;justify-content:center;flex-direction:column;gap:20px;}
.loading-pet{font-size:80px;animation:float 2s ease-in-out infinite;}
.loading-title{font-size:26px;font-weight:900;color:var(--brown-dark);letter-spacing:4px;}
.loading-sub{font-size:12px;color:var(--brown-light);letter-spacing:2px;}
.loading-bar-wrap{width:200px;height:6px;background:var(--warm);border-radius:3px;overflow:hidden;}
.loading-bar{height:100%;background:linear-gradient(90deg,var(--brown-light),var(--gold));border-radius:3px;width:0%;transition:width .1s;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

/* LOGIN */
#screen-login{background:linear-gradient(135deg,#fdf0e0,#fff5eb);align-items:center;justify-content:center;padding:24px;}
.login-card{background:#fff;border-radius:24px;padding:32px 24px;width:100%;max-width:340px;box-shadow:0 8px 40px var(--shadow);text-align:center;}
.login-emoji{font-size:56px;display:block;margin-bottom:6px;animation:float 2s ease-in-out infinite;}
.login-title{font-size:20px;font-weight:900;color:var(--brown-dark);margin-bottom:4px;}
.login-sub{font-size:11px;color:var(--brown-light);margin-bottom:22px;line-height:1.6;}
.login-tabs{display:flex;gap:0;margin-bottom:20px;border:2px solid var(--warm);border-radius:12px;overflow:hidden;}
.ltab{flex:1;padding:9px;background:#fff;border:none;font-family:'Zen Maru Gothic',sans-serif;font-size:12px;font-weight:700;color:var(--brown-light);cursor:pointer;transition:all .2s;}
.ltab.active{background:var(--brown-dark);color:#fff;}
.login-field{margin-bottom:12px;text-align:left;}
.login-field label{display:block;font-size:11px;font-weight:700;color:var(--brown-light);margin-bottom:4px;}
.login-field input{width:100%;padding:12px 14px;border:2px solid var(--warm);border-radius:10px;font-family:'Zen Maru Gothic',sans-serif;font-size:14px;color:var(--brown-dark);background:#fffaf5;outline:none;transition:border-color .2s;}
.login-field input:focus{border-color:var(--brown-light);}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--brown),var(--brown-dark));color:#fff;border:none;border-radius:12px;font-family:'Zen Maru Gothic',sans-serif;font-size:15px;font-weight:900;cursor:pointer;margin-top:4px;transition:all .2s;box-shadow:0 4px 14px rgba(92,61,46,.3);}
.login-btn:active{transform:scale(.97);}
.login-err{min-height:18px;font-size:11px;color:var(--red);margin-top:8px;text-align:center;}

/* SHOP */
#screen-shop{background:linear-gradient(180deg,#fff8f0,#fdf6ec);}
.shop-header{padding:20px 20px 12px;text-align:center;background:linear-gradient(180deg,#fff3e0,transparent);border-bottom:2px dashed var(--warm);position:sticky;top:0;z-index:10;backdrop-filter:blur(8px);}
.shop-sign{display:inline-flex;align-items:center;gap:8px;background:var(--brown-dark);color:#fff8f0;padding:8px 22px;border-radius:40px;font-size:16px;font-weight:900;letter-spacing:3px;box-shadow:0 4px 16px rgba(92,61,46,.3);margin-bottom:8px;}
.shop-sub{font-size:11px;color:var(--brown-light);}
.shop-filter{display:flex;gap:8px;overflow-x:auto;padding:10px 16px;scrollbar-width:none;}
.shop-filter::-webkit-scrollbar{display:none;}
.filter-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:2px solid var(--warm);background:#fff;font-family:'Zen Maru Gothic',sans-serif;font-size:11px;font-weight:700;color:var(--brown);cursor:pointer;transition:all .2s;white-space:nowrap;}
.filter-btn.active,.filter-btn:hover{background:var(--brown-dark);color:#fff;border-color:var(--brown-dark);}
.pet-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:12px 16px;flex:1;}
.pet-card{background:#fff;border-radius:14px;padding:12px 6px;text-align:center;cursor:pointer;border:2px solid transparent;transition:all .2s;box-shadow:0 2px 8px var(--shadow);position:relative;}
.pet-card.selected{border-color:var(--gold);background:linear-gradient(135deg,#fff9f0,#fff);}
.pet-emoji{font-size:36px;display:block;margin-bottom:4px;line-height:1;}
.pet-card-name{font-size:10px;font-weight:700;color:var(--brown-dark);}
.pet-card-type{font-size:9px;color:var(--brown-light);margin-top:1px;}
.pet-rarity{position:absolute;top:5px;right:5px;font-size:8px;padding:2px 5px;border-radius:6px;font-weight:700;}
.rarity-rare{background:#ffe0b2;color:#e65100;}
.rarity-epic{background:#e8d5ff;color:#6a1b9a;}
.rarity-legend{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#fff;}
.shop-footer{padding:14px 16px;background:#fff;border-top:2px solid var(--warm);position:sticky;bottom:0;}
.btn-select{width:100%;padding:15px;background:linear-gradient(135deg,var(--brown),var(--brown-dark));color:#fff;border:none;border-radius:14px;font-family:'Zen Maru Gothic',sans-serif;font-size:16px;font-weight:900;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(92,61,46,.3);letter-spacing:2px;}
.btn-select:disabled{opacity:.4;cursor:not-allowed;}

/* NAME */
#screen-name{background:linear-gradient(135deg,#fff8f0,#fdf6ec);align-items:center;justify-content:center;padding:32px 24px;}
.name-box{width:100%;max-width:360px;background:#fff;border-radius:28px;padding:32px 24px;box-shadow:0 8px 40px var(--shadow);text-align:center;}
.name-pet-display{font-size:72px;display:block;margin-bottom:6px;animation:float 2s ease-in-out infinite;}
.name-pet-species{font-size:13px;color:var(--brown-light);margin-bottom:6px;}
.name-title{font-size:17px;font-weight:900;color:var(--brown-dark);margin-bottom:4px;}
.name-sub{font-size:11px;color:var(--brown-light);margin-bottom:20px;line-height:1.6;}
.gender-select{display:flex;gap:10px;justify-content:center;margin-bottom:20px;}
.gender-btn{flex:1;padding:10px;border-radius:12px;border:2px solid var(--warm);background:#fffaf5;font-family:'Zen Maru Gothic',sans-serif;font-size:13px;font-weight:700;color:var(--brown);cursor:pointer;transition:all .2s;}
.gender-btn.male.selected{background:linear-gradient(135deg,#e3f2fd,#bbdefb);border-color:#64b5f6;color:#1565c0;}
.gender-btn.female.selected{background:linear-gradient(135deg,#fce4ec,#f8bbd0);border-color:#f48fb1;color:#c62828;}
.name-input{width:100%;padding:13px 14px;border:2px solid var(--warm);border-radius:12px;font-family:'Zen Maru Gothic',sans-serif;font-size:17px;font-weight:700;text-align:center;color:var(--brown-dark);background:#fffaf5;outline:none;transition:border-color .2s;margin-bottom:12px;}
.name-input:focus{border-color:var(--brown-light);}
.name-suggestions{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:20px;}
.sug-btn{padding:5px 12px;border-radius:18px;background:var(--warm);border:none;font-family:'Zen Maru Gothic',sans-serif;font-size:11px;font-weight:700;color:var(--brown);cursor:pointer;}
.btn-adopt{width:100%;padding:15px;background:linear-gradient(135deg,var(--green),#5a9e58);color:#fff;border:none;border-radius:12px;font-family:'Zen Maru Gothic',sans-serif;font-size:15px;font-weight:900;cursor:pointer;box-shadow:0 4px 16px rgba(124,184,122,.4);letter-spacing:2px;}
.btn-back-name{margin-top:10px;background:none;border:none;font-family:'Zen Maru Gothic',sans-serif;font-size:12px;color:var(--brown-light);cursor:pointer;text-decoration:underline;}

/* ARRIVE */
#screen-arrive{background:linear-gradient(135deg,#fff8f0,#fef3e8);align-items:center;justify-content:center;flex-direction:column;gap:18px;text-align:center;padding:40px 24px;}
.arrive-emoji{font-size:90px;animation:arrive-bounce .6s ease;}
@keyframes arrive-bounce{0%{transform:scale(0) rotate(-20deg);opacity:0}60%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1) rotate(0);opacity:1}}
.arrive-title{font-size:22px;font-weight:900;color:var(--brown-dark);}
.arrive-bubble{background:#fff;border-radius:18px;padding:18px 22px;box-shadow:0 4px 20px var(--shadow);font-size:14px;color:var(--brown-dark);line-height:1.8;max-width:300px;position:relative;}
.arrive-bubble::before{content:'💬';font-size:18px;position:absolute;top:-12px;left:18px;}
.btn-start-life{padding:15px 36px;background:linear-gradient(135deg,var(--gold),#d4960a);color:#fff;border:none;border-radius:12px;font-family:'Zen Maru Gothic',sans-serif;font-size:15px;font-weight:900;cursor:pointer;box-shadow:0 4px 16px rgba(232,184,75,.4);letter-spacing:2px;}

/* HOME */
#screen-home{background:linear-gradient(180deg,#fff8f0,#fdf6ec);flex-direction:column;}
.home-header{padding:14px 18px 10px;display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.9);border-bottom:1px solid var(--warm);backdrop-filter:blur(8px);position:sticky;top:0;z-index:10;}
.home-pet-info{display:flex;align-items:center;gap:9px;}
.home-pet-avatar{width:42px;height:42px;background:linear-gradient(135deg,var(--warm),#fff);border-radius:50%;border:2px solid var(--brown-light);display:flex;align-items:center;justify-content:center;font-size:24px;}
.home-pet-name{font-size:14px;font-weight:900;color:var(--brown-dark);}
.home-pet-sub{font-size:10px;color:var(--brown-light);}
.home-trust-wrap{display:flex;align-items:center;gap:5px;}
.trust-label{font-size:9px;color:var(--brown-light);}
.trust-bar-bg{width:55px;height:5px;background:var(--warm);border-radius:3px;overflow:hidden;}
.trust-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),#f4c842);transition:width .8s;}
.trust-num{font-size:10px;font-weight:700;color:var(--gold);}
.home-menu-btn{width:34px;height:34px;border-radius:50%;background:var(--warm);border:none;font-size:16px;cursor:pointer;}
.pet-display-area{background:linear-gradient(180deg,#fff5e8,#fff8f0);padding:16px 20px 12px;text-align:center;border-bottom:2px dashed var(--warm);}
.pet-big{font-size:68px;display:inline-block;animation:breathe 3s ease-in-out infinite;filter:drop-shadow(0 8px 16px rgba(92,61,46,.15));}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.pet-mood{display:inline-flex;align-items:center;gap:5px;background:#fff;border-radius:18px;padding:3px 10px;margin-top:6px;font-size:11px;color:var(--brown);box-shadow:0 2px 8px var(--shadow);}
.mood-dot{width:7px;height:7px;border-radius:50%;background:var(--green);}
.mode-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:700;margin-top:4px;}
.mode-heal{background:#fce4ec;color:#c62828;}
.mode-hype{background:#e8f5e9;color:#2e7d32;}
.mode-normal{background:var(--warm);color:var(--brown);}
.chat-area{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}
.msg-wrap{display:flex;gap:7px;max-width:100%;}
.msg-wrap.user{flex-direction:row-reverse;}
.msg-avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--warm),#fff);border:2px solid var(--brown-light);display:flex;align-items:center;justify-content:center;font-size:16px;align-self:flex-end;}
.msg-avatar.user-avatar{background:linear-gradient(135deg,var(--blue),#5a9ec4);border-color:#5a9ec4;font-size:12px;}
.msg-bubble{max-width:74%;padding:9px 13px;border-radius:16px;font-size:13px;line-height:1.7;}
.msg-bubble.pet{background:#fff;color:var(--brown-dark);border-radius:4px 16px 16px 16px;box-shadow:0 2px 8px var(--shadow);}
.msg-bubble.user{background:linear-gradient(135deg,var(--brown),var(--brown-dark));color:#fff;border-radius:16px 4px 16px 16px;}
.msg-time{font-size:9px;opacity:.5;margin-top:3px;text-align:right;}
.msg-bubble.pet .msg-time{text-align:left;}
.typing-indicator{display:flex;gap:4px;align-items:center;padding:10px 14px;background:#fff;border-radius:4px 16px 16px 16px;box-shadow:0 2px 8px var(--shadow);width:fit-content;}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--brown-light);animation:typing-bounce 1.2s ease-in-out infinite;}
.typing-dot:nth-child(2){animation-delay:.2s;}
.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes typing-bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-7px)}}
.chat-input-area{padding:10px 14px;background:rgba(255,255,255,.95);border-top:1px solid var(--warm);backdrop-filter:blur(8px);}
.quick-replies{display:flex;gap:7px;overflow-x:auto;margin-bottom:8px;scrollbar-width:none;}
.quick-replies::-webkit-scrollbar{display:none;}
.quick-btn{flex-shrink:0;padding:5px 12px;border-radius:18px;background:var(--warm);border:1px solid var(--brown-light);font-family:'Zen Maru Gothic',sans-serif;font-size:11px;font-weight:700;color:var(--brown);cursor:pointer;white-space:nowrap;}
.input-row{display:flex;gap:7px;}
.chat-input{flex:1;padding:11px 14px;border:2px solid var(--warm);border-radius:22px;font-family:'Zen Maru Gothic',sans-serif;font-size:13px;color:var(--brown-dark);background:#fffaf5;outline:none;resize:none;max-height:80px;}
.chat-input:focus{border-color:var(--brown-light);}
.send-btn{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--brown),var(--brown-dark));border:none;color:#fff;font-size:17px;cursor:pointer;flex-shrink:0;box-shadow:0 3px 10px rgba(92,61,46,.3);display:flex;align-items:center;justify-content:center;}
.send-btn:disabled{opacity:.4;}

/* DRAWER */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;display:none;opacity:0;transition:opacity .3s;}
.drawer-overlay.open{display:block;opacity:1;}
.profile-drawer{position:fixed;right:0;top:0;bottom:0;width:88%;max-width:340px;background:#fff;z-index:51;transform:translateX(100%);transition:transform .3s ease;overflow-y:auto;padding:28px 20px 40px;border-radius:22px 0 0 22px;box-shadow:-8px 0 40px rgba(92,61,46,.15);}
.profile-drawer.open{transform:translateX(0);}
.drawer-title{font-size:17px;font-weight:900;color:var(--brown-dark);margin-bottom:18px;padding-bottom:14px;border-bottom:2px dashed var(--warm);display:flex;align-items:center;justify-content:space-between;}
.drawer-logout-btn{font-size:10px;padding:4px 10px;background:var(--warm);border:none;border-radius:8px;color:var(--brown);cursor:pointer;font-family:'Zen Maru Gothic',sans-serif;font-weight:700;}
.profile-pet-big{text-align:center;font-size:56px;margin-bottom:6px;}
.profile-section{margin-bottom:20px;}
.profile-section-title{font-size:11px;font-weight:700;color:var(--brown-light);letter-spacing:2px;margin-bottom:8px;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between;}
.profile-item{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:var(--warm);border-radius:8px;margin-bottom:5px;font-size:12px;}
.profile-item-key{color:var(--brown);font-weight:500;}
.profile-item-val{color:var(--brown-dark);font-weight:700;}
.tag-list{display:flex;flex-wrap:wrap;gap:5px;}
.tag{padding:3px 10px;border-radius:18px;background:linear-gradient(135deg,var(--warm),#ffe8cc);font-size:11px;font-weight:700;color:var(--brown);border:1px solid var(--brown-light);}
.trust-display{text-align:center;padding:14px;background:linear-gradient(135deg,#fff9f0,var(--warm));border-radius:12px;margin-bottom:18px;}
.trust-big{font-size:38px;font-weight:900;color:var(--gold);}
.trust-level{font-size:12px;color:var(--brown);margin-top:3px;}
.brain-display{display:flex;gap:8px;margin-top:8px;}
.brain-bar{flex:1;text-align:center;padding:8px;border-radius:10px;font-size:10px;font-weight:700;}
.brain-left{background:#e3f2fd;color:#1565c0;}
.brain-right{background:#fce4ec;color:#c62828;}
.btn-new-pet{width:100%;padding:13px;background:linear-gradient(135deg,var(--pink),#e87b9a);color:#fff;border:none;border-radius:12px;font-family:'Zen Maru Gothic',sans-serif;font-size:13px;font-weight:900;cursor:pointer;box-shadow:0 4px 14px rgba(244,167,185,.4);margin-top:6px;}

/* メモリーボックス */
.memory-box{background:linear-gradient(135deg,#fff9f0,#fffaf5);border:2px solid #f0d8b0;border-radius:14px;padding:14px;margin-bottom:16px;}
.memory-list{display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto;margin-bottom:10px;}
.memory-item{display:flex;align-items:flex-start;gap:8px;background:#fff;border-radius:10px;padding:8px 10px;border:1px solid var(--warm);font-size:12px;color:var(--brown-dark);line-height:1.5;}
.memory-item-text{flex:1;}
.memory-del-btn{background:none;border:none;font-size:14px;color:var(--brown-light);cursor:pointer;flex-shrink:0;padding:0 2px;}
.memory-del-btn:active{color:var(--red);}
.memory-empty{font-size:11px;color:var(--brown-light);text-align:center;padding:10px 0;}
.memory-input-row{display:flex;gap:6px;}
.memory-input{flex:1;padding:8px 10px;border:1.5px solid var(--warm);border-radius:9px;font-family:'Zen Maru Gothic',sans-serif;font-size:12px;color:var(--brown-dark);background:#fffaf5;outline:none;}
.memory-input:focus{border-color:var(--brown-light);}
.memory-add-btn{padding:8px 12px;background:linear-gradient(135deg,var(--gold),#d4960a);color:#fff;border:none;border-radius:9px;font-family:'Zen Maru Gothic',sans-serif;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--brown-dark);color:#fff;padding:9px 22px;border-radius:22px;font-size:12px;font-weight:700;z-index:200;pointer-events:none;animation:toast-in .3s ease;white-space:nowrap;box-shadow:0 4px 16px rgba(92,61,46,.4);}
@keyframes toast-in{from{bottom:70px;opacity:0}to{bottom:90px;opacity:1}}
</style>
</head>
<body>

<!-- LOADING -->
<div class="screen active" id="screen-loading">
  <div class="loading-pet" id="loading-emoji">🐾</div>
  <div class="loading-title">AI ペットっち</div>
  <div class="loading-sub">あなただけの相棒と出会う</div>
  <div class="loading-bar-wrap"><div class="loading-bar" id="loading-bar"></div></div>
</div>

<!-- LOGIN -->
<div class="screen" id="screen-login">
  <div class="login-card">
    <span class="login-emoji">🐾</span>
    <div class="login-title">AI ペットっち</div>
    <div class="login-sub">ログインするとデータが<br>どの端末でも引き継げます</div>
    <div class="login-tabs">
      <button class="ltab active" id="ltab-in" onclick="switchLoginTab('in')">ログイン</button>
      <button class="ltab" id="ltab-up" onclick="switchLoginTab('up')">新規登録</button>

let loginMode = 'in';
function switchLoginTab(m){

async function doLogin(){
  const email=document.getElementById('l-email').value.trim();
  const pass=document.getElementById('l-pass').value;
  const err=document.getElementById('l-err');
  err.textContent='';
  if(!email||!pass){err.textContent='メールとパスワードを入力してください';return;}
  const btn=document.querySelector('.login-btn');
  btn.textContent='処理中…'; btn.disabled=true;
  try{
    const fb=window._fb;
    if(loginMode==='in') await fb.signIn(email,pass);
    else await fb.signUp(email,pass);
  }catch(e){
    const msgs={'auth/user-not-found':'メールアドレスが見つかりません','auth/wrong-password':'パスワードが違います',
      'auth/email-already-in-use':'このメールは登録済みです','auth/weak-password':'パスワードは6文字以上',
      'auth/invalid-email':'メールアドレスの形式が正しくありません','auth/invalid-credential':'メールまたはパスワードが違います'};
    err.textContent=msgs[e.code]||e.message;
  }
  btn.textContent='🔑 ログイン'; btn.disabled=false;
}

async function doLogout(){
  if(!confirm('ログアウトしますか？'))return;
  closeDrawer();
  await window._fb.signOut();
}

// ===== AUTH監視 =====
function waitFb(cb){
  if(window._fb) cb();
  else window.addEventListener('fb-ready',cb,{once:true});
}
waitFb(()=>{
  window.addEventListener('fb-auth-change', async e=>{
    const user = e.detail;
    if(user){
      // ログイン成功 → データロードしてアプリへ
      await loadState(user.uid);
      if(STATE.pet) { showScreen('home'); initHome(); }
      else { showScreen('shop'); renderPetGrid(); }
    } else {
      // 未ログイン → ログイン画面
      showScreen('login');
    }
  });
  // 既にauth状態があれば即発火
  if(window._fbUser !== undefined){
    window.dispatchEvent(new CustomEvent('fb-auth-change',{detail:window._fbUser}));
  }
});

// ===== SAVE / LOAD (デバウンス付き) =====
const SAVE_KEY = 'ai-petchi-v4';
let _saveTimer = null;

function saveState(){
  // localStorage即時
  const uid = window._fbUser?.uid;
  const toSave = {...STATE, messages: STATE.messages.slice(-50)};
  try{ localStorage.setItem(SAVE_KEY+(uid||''), JSON.stringify(toSave)); }catch(e){}
  // Firestore: 3秒デバウンス
  if(_saveTimer) clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async ()=>{
    if(!uid) return;
    try{
      await window._fb.setDoc(uid, {...toSave, updatedAt: window._fb.serverTimestamp()});
    }catch(e){ console.warn('Firestore save:', e); }
  }, 3000);
}

async function loadState(uid){
  // Firestore優先
  try{
    const snap = await window._fb.getDoc(uid);
    if(snap.exists()){
      const d = snap.data();
      if(d.pet && d.petName){ Object.assign(STATE, d); return; }
    }
  }catch(e){ console.warn('Firestore load:', e); }
  // localStorageフォールバック
  try{
    const raw = localStorage.getItem(SAVE_KEY+uid) || localStorage.getItem(SAVE_KEY);
    if(!raw) return;
    const d = JSON.parse(raw);
    if(d.pet && d.petName){ Object.assign(STATE, d); }
  }catch(e){}
}

// ===== メモリーボックス =====
function addMemory(text){
  const input = document.getElementById('memory-input');
  const t = text || input.value.trim();
  if(!t) return;
  if(!STATE.memories) STATE.memories=[];
  // 重複チェック
  if(STATE.memories.some(m=>m.text===t)){ showToast('すでに記憶しています'); return; }
  STATE.memories.unshift({text:t, auto:!!text, ts:Date.now()});
  if(STATE.memories.length>30) STATE.memories=STATE.memories.slice(0,30);
  if(!text) input.value='';
  renderMemoryList();
  saveState();
}

function deleteMemory(i){
  STATE.memories.splice(i,1);
  renderMemoryList();
  saveState();
}

function renderMemoryList(){
  const el = document.getElementById('memory-list');
  if(!STATE.memories||!STATE.memories.length){
    el.innerHTML='<div class="memory-empty">まだ記憶がありません</div>';
    return;
  }
  el.innerHTML = STATE.memories.map((m,i)=>`
    <div class="memory-item">
      <span style="font-size:11px;flex-shrink:0;opacity:.6;">${m.auto?'🤖':'✏️'}</span>
      <span class="memory-item-text">${esc(m.text)}</span>
      <button class="memory-del-btn" onclick="deleteMemory(${i})">🗑</button>
    </div>`).join('');
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// 会話からAIが自動記憶を抽出（Gemini側の返答ではなく、ユーザー発言から）
function autoExtractMemory(text){
  // 重要な事実パターン
  const patterns = [
    {r:/私は(.{2,15})(が好き|が嫌い|が苦手|が得意)/,f:(m)=>`${m[1]}${m[2]}`},
    {r:/(.{2,10})の仕事(をしてる|をしている|です)/,f:(m)=>`仕事：${m[1]}`},
    {r:/(\d+)歳/,f:(m)=>`${m[1]}歳`},
    {r:/(.{2,8})に住んで(いる|います)/,f:(m)=>`居住地：${m[1]}`},
    {r:/趣味は(.{2,12})/,f:(m)=>`趣味：${m[1]}`},
    {r:/(.{2,8})が(悩み|不安|心配)/,f:(m)=>`悩み：${m[1]}`},
    {r:/最近(.{3,20})(があった|した|だった)/,f:(m)=>`最近の出来事：${m[1]}`},
  ];
  for(const p of patterns){
    const m=text.match(p.r);
    if(m){ const mem=p.f(m); addMemory(mem); return; }
  }
}

// ===== 感情・学習 =====
function estimateCortisol(text){
  const h=['つらい','疲れた','しんどい','悲しい','落ち込','不安','怖い','泣き','憂鬱','眠れない','だるい','ストレス'];
  const p=['嬉しい','楽しい','できた','やった','最高','わくわく','テンション','好き','ありがとう','成功'];
  if(h.some(w=>text.includes(w))){STATE.cortisol='heal';return;}
  if(p.filter(w=>text.includes(w)).length>=2){STATE.cortisol='hype';return;}
  STATE.cortisol='normal';
}
function analyzeBrain(text){
  const l=['なぜ','理由','分析','論理','データ','効率','計画','考える','比較','結果','原因','方法'];
  const r=['感じる','好き','嫌い','楽しい','悲しい','きれい','かわいい','怖い','嬉しい','癒し','ドキドキ','ふわふわ'];
  const lc=l.filter(w=>text.includes(w)).length;
  const rc=r.filter(w=>text.includes(w)).length;
  if(lc>0||rc>0){
    const p=STATE.ownerProfile;
    p.brainLeft=Math.round(Math.min(90,Math.max(10,p.brainLeft+lc*3-rc*2)));
    p.brainRight=100-p.brainLeft;
  }
}
function learnOwnerProfile(text){
  const p=STATE.ownerProfile;
  const wm=text.match(/(\d+)時(頃)?に?(起き|起床)/);if(wm)p.wakeTime=wm[1]+':00';
  const sm=text.match(/(\d+)時(頃)?に?(寝|就寝)/);if(sm)p.sleepTime=sm[1]+':00';
  const hobbies=['読書','映画','ゲーム','料理','音楽','散歩','旅行','スポーツ','釣り','登山','カフェ','DIY','プログラミング','編み物','絵','写真','アニメ','漫画','筋トレ','ヨガ'];
  hobbies.forEach(h=>{if(text.includes(h)&&!p.hobby.includes(h))p.hobby.push(h);});
  const words=text.match(/[ぁ-ん一-龠]{2,5}/g)||[];
  const stop=['こと','もの','これ','それ','あれ','どこ','なに','いつ','だから','けど','でも','から','ので','たら'];
  words.forEach(w=>{if(!stop.includes(w)&&!p.keywords.includes(w)&&p.keywords.length<30)p.keywords.push(w);});
  estimateCortisol(text);
  analyzeBrain(text);
  autoExtractMemory(text); // 自動記憶抽出
}

// ===== Gemini呼び出し =====
async function callGemini(userInput){
  const url=window._fb?.FUNCTIONS_URL;
  if(!url)throw new Error('Functions URL未設定');
  const p=STATE.ownerProfile;
  if(!STATE.memories)STATE.memories=[];

  // メモリーボックスを長期記憶として整形
  const memText=STATE.memories.length
    ? '【長期記憶・重要な事実】\n'+STATE.memories.map(m=>'・'+m.text).join('\n')
    : '';

  let systemPrompt='';
  if(STATE.pet.id==='cashier'){
    const rel=STATE.trust<20?'店員。敬語のみ。まだ他人。':STATE.trust<40?'顔なじみの店員。少し砕けてくる。':STATE.trust<60?'仲良しの店員。タメ口混じり。プライベートな話もする。':STATE.trust<80?'気になる存在。ドキドキする距離感。好意がにじんでいる。':'彼女。完全に恋人。甘えてくる。名前で呼ぶ。「好き」「会いたかった」「デートしよ」など恋人らしい会話。';
    systemPrompt=`あなたはスーパーの女性店員「${STATE.petName}」です。
【現在の関係】信頼度${STATE.trust}/100 → ${rel}
${memText}
【飼い主情報】趣味:${p.hobby.join('、')||'不明'} 起床:${p.wakeTime||'不明'}
【ルール】実在の人物として自然に演じる。AIとは絶対に言わない。信頼度に応じた関係性を徹底。料理材料→レシピ提案。悩みには寄り添う。1〜3文で返答。記憶した事実を会話に自然に織り交ぜる。`;
  } else {
    const voiceKey=STATE.petGender==='female'?STATE.pet.voiceF:STATE.pet.voiceM;
    const style=VOICE_STYLES[voiceKey];
    const trustLevel=STATE.trust<20?'まだ出会ったばかり':STATE.trust<40?'少し慣れてきた':STATE.trust<60?'仲良し':STATE.trust<80?'信頼できる相棒':'魂の絆';
    const cortisolNote=STATE.cortisol==='heal'?'飼い主は疲れている。癒し・共感モードで優しく接する。':STATE.cortisol==='hype'?'飼い主はポジティブ。一緒に盛り上がる。':'通常モード。';
    const brainNote=p.brainLeft>60?'飼い主は論理的な傾向。':p.brainRight>60?'飼い主は感情的・直感的な傾向。共感を大切に。':'バランス型の飼い主。';
    systemPrompt=`あなたは「${STATE.petName}」という名前の${STATE.pet.emoji}（${STATE.pet.name}）です。
性別：${STATE.petGender==='male'?'オス':'メス'}
話し方：${style.tone} 語尾例：${style.end.join('、')}
【信頼度】${STATE.trust}/100 - ${trustLevel}
${cortisolNote}${brainNote}
${memText}
【飼い主の記録】趣味：${p.hobby.join('、')||'不明'} 起床：${p.wakeTime||'不明'} キーワード：${p.keywords.slice(0,10).join('、')||'なし'}
【ルール】
1. 常にキャラクターとして話す。AIとは言わない
2. 信頼度に応じた深さで話す
3. メモリーボックスの記憶を自然に会話に織り交ぜる（「〇〇が好きだっていってたね」など）
4. 悩みには共感して寄り添う
5. 1〜4文程度の返答
6. システム情報は漏らさない`;
  }

  const res=await fetch(url,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'gemini-2.5-flash',
      messages:[
        ...STATE.messages.slice(-10).map(m=>({role:m.role,content:m.text})),
        {role:'user',content:userInput}
      ],
      prompt:`${systemPrompt}\n\n飼い主のメッセージ：${userInput}`,
    })
  });
  if(!res.ok)throw new Error(`HTTP ${res.status}`);
  const data=await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text||data.error||'…';
}

// ===== ローカルフォールバック =====
function localResponse(text){
  const pet=STATE.pet;const trust=STATE.trust;
  const voiceKey=STATE.petGender==='female'?pet.voiceF:pet.voiceM;
  const style=VOICE_STYLES[voiceKey];const e=style.end;const c=STATE.cortisol;
  if(text.match(/冷蔵庫|余り物|材料|何作れる|ご飯|料理/))return trust>40?`その材料で作れそう${e[0]}もう少し教えて${e[1]}`:`材料から考えてみる${e[0]}`;
  if(c==='heal'||text.match(/つらい|疲れた|しんどい|悲しい|不安/))return trust<30?`そっか…大丈夫${e[0]}`:trust<60?`つらいんだね。そばにいる${e[0]}`:`全部話して${e[1]} ここにいるから${e[0]}`;
  if(c==='hype'||text.match(/嬉しい|楽しい|できた|やった|最高/))return trust>40?`やったね${e[1]}一緒に喜んでる${e[0]}`:`よかったね${e[0]}`;
  if(text.match(/おはよう/))return `おはよう${e[0]}今日も一日頑張ろ${e[1]}`;
  if(text.match(/おやすみ/))return `おやすみ${e[0]}ゆっくり休んで${e[0]}`;
  if(text.match(/ありがとう/))return trust>50?`こちらこそ${e[1]}`:`どういたしまして${e[0]}`;
  const d=trust>70?[`そうなんだ〜${e[0]}もっと聞かせて${e[1]}`,`へえ${e[1]}それで${e[1]}`]:trust>40?[`そっか${e[0]}`,`なるほどね${e[0]}`]:[`うん${e[0]}`,`そうなんだね${e[0]}`];
  return d[Math.floor(Math.random()*d.length)];
}

// ===== sendMessage =====
async function sendMessage(){
  const input=document.getElementById('chat-input');
  const text=input.value.trim();
  if(!text)return;
  input.value='';input.style.height='auto';
  document.getElementById('send-btn').disabled=true;
  addMessage('user',text);
  STATE.convCount++;
  learnOwnerProfile(text);
  updateModeBadge();
  showTyping();
  try{
    const reply=await callGemini(text);
    hideTyping();addMessage('pet',reply);
  }catch(e){
    hideTyping();
    addMessage('pet',localResponse(text));
    if(e.message&&!e.message.includes('未設定'))showToast('⚠ オフライン応答中');
  }
  const trustAdd=STATE.pet.id==='cashier'?2:(Math.random()<0.5?1:0);
  STATE.trust=Math.min(100,STATE.trust+trustAdd);
  if(STATE.pet.id==='cashier'&&STATE.trust>=80&&!STATE.gfMode){
    STATE.gfMode=true;showToast('💗 彼女になった！');
    document.getElementById('pet-big-emoji').textContent='💑';
    document.getElementById('home-avatar').textContent='💑';
  }
  updateTrustBar();updateQuickReplies();
  document.getElementById('send-btn').disabled=false;
  saveState();
}

  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.transition='opacity .5s';t.style.opacity='0';setTimeout(()=>t.remove(),500);},2000);
}
</script>
